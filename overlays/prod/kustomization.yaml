apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: wely-prod

# On peut ici modifier le nombre de réplicas ou d'autres paramètres pour la prod
patches:
  - target:
      kind: Deployment
      name: wely-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
