apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: wely-dev

# On peut ici ajouter des préfixes aux noms ou modifier des variables spécifiques au dev
namePrefix: dev-
 
patches:
  - target:
      kind: Deployment
      name: wely-web
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "http://dev-wely-gateway-service:8081"
  - target:
      kind: Deployment
      name: wely-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "http://dev-wely-auth-service:8080/realms/calendar-app/protocol/openid-connect/certs"
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "http://dev-wely-users-service:8082"
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: "http://dev-wely-social-service:8083"
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "http://dev-wely-chat-service:8084"
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: "ws://dev-wely-chat-service:8084"
      - op: replace
        path: /spec/template/spec/containers/0/env/7/value
        value: "http://dev-wely-events-service:8086"
  - target:
      kind: Deployment
      name: wely-users
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: "http://dev-wely-auth-service:8080/realms/calendar-app/protocol/openid-connect/certs"
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "http://dev-wely-auth-service:8080/realms/calendar-app/protocol/openid-connect/token"
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: "http://dev-wely-auth-service:8080"
  - target:
      kind: Deployment
      name: wely-social
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/8/value
        value: "http://dev-wely-auth-service:8080/realms/calendar-app/protocol/openid-connect/certs"
  - target:
      kind: Deployment
      name: wely-chat
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "http://dev-wely-auth-service:8080/realms/calendar-app/protocol/openid-connect/certs"
  - target:
      kind: Deployment
      name: wely-events
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "http://dev-wely-auth-service:8080/realms/calendar-app/protocol/openid-connect/certs"
