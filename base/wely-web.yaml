apiVersion: apps/v1
kind: Deployment
metadata:
  name: wely-web
  labels:
    app: wely
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wely-web
  template:
    metadata:
      labels:
        app: wely-web
    spec:
      imagePullSecrets:
      - name: wely-registry
      containers:
      - name: angular-app
        image: ghcr.io/welylabs/wely-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: GATEWAY_URL
          value: "http://wely-gateway-service:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: wely-web-service
spec:
  selector:
    app: wely-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
